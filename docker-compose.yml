services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema_gestion_gimnasio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sistema_gestion_gimnasio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sistema_gestion_gimnasio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sistema_gestion_gimnasio_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_gestion_gimnasio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sistema_gestion_gimnasio}?schema=public
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sistema_gestion_gimnasio_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema_gestion_gimnasio_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sistema_gestion_gimnasio_net

volumes:
  postgres_data:
    driver: local

networks:
  gestion_academica_net:
    driver: bridge